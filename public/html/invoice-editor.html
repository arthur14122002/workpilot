<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkPilot – Rechnung bearbeiten</title>

<link rel="stylesheet" href="/css/app-layout.css" />
<link rel="stylesheet" href="/css/invoice-editor.css" />
</head>
<body>
<div class="appShell">
<aside class="sidebar">
<div>
<div class="logoWrap">
<div class="logoBox">WP</div>
<div class="logoText">WorkPilot</div>
</div>

<nav class="navGroup">
<a class="navLink" href="/">Dashboard</a>
<a class="navLink" href="/contacts">Kontakte</a>
<a class="navLink" href="/offers">Angebote</a>
<a class="navLink" href="/invoices">Rechnungen</a>
<a class="navLink" href="/emails">
E-Mails
<span id="emailCounter" class="navCounter" style="display:none;">0</span>
</a>
<a class="navLink" href="/settings">Profil</a>
</nav>
</div>

<div class="sidebarBottom">
<a class="navLink" href="/login">Anmelden</a>
</div>
</aside>

<main class="content">
<header class="pageHeader">
<div class="pageEyebrow">Rechnung bearbeiten</div>

<h1 class="pageTitle">
Rechnungsvorschau
</h1>

<p class="pageSubtitle">
Prüfe die Rechnung und trage Mengen, Preise und Leistungen ein.
</p>
</header>

<div class="editorActions">
<a class="btn btnSecondary" href="/invoices">Zurück</a>
<button class="btn btnSecondary" id="addPositionBtn">Position hinzufügen</button>
<button class="btn btnSecondary" id="printBtn">Drucken / PDF</button>
<button class="btn btnPrimary" id="saveOfferBtn">Speichern</button>
</div>

<div id="offerDocument" class="offerDocument"></div>

<div class="notice" id="editorNotice">Rechnung wurde gespeichert.</div>
</main>
</div>

<script src="/js/app-layout.js"></script>
<script src="/js/invoice-editor.js"></script>
</body>
</html>
