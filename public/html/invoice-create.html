<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>WorkPilot – Neue Rechnung</title>

<link rel="stylesheet" href="/css/app-layout.css" />
<link rel="stylesheet" href="/css/invoice-create.css" />
</head>
<body>
<div class="appShell">
<aside class="sidebar">
<div>
<div class="logoWrap">
<div class="logoBox">WP</div>
<div class="logoText">WorkPilot</div>
</div>

<nav class="navGroup">
<a class="navLink" href="/">Dashboard</a>
<a class="navLink" href="/contacts">Kontakte</a>
<a class="navLink" href="/offers">Angebote</a>
<a class="navLink" href="/invoices">Rechnungen</a>
<a class="navLink" href="/emails">E-Mails</a>
<a class="navLink" href="/settings">Profil</a>
</nav>
</div>

<div class="sidebarBottom">
<a class="navLink" href="/login">Anmelden</a>
</div>
</aside>

<main class="content">
<header class="pageHeader">
<div class="pageEyebrow">Rechnung erstellen</div>
<h1 class="pageTitle">Neue Rechnung vorbereiten</h1>
<p class="pageSubtitle">
Gib Empfänger und Leistungen ein. WorkPilot erstellt daraus eine Rechnung.
</p>
</header>

<section class="card createCard">
<form id="invoiceCreateForm">
<div class="formGrid">
<div class="formField">
<label for="recipientName">Empfänger / Kunde</label>
<input id="recipientName" placeholder="Max Mustermann" required />
</div>

<div class="formField">
<label for="recipientEmail">E-Mail des Kunden</label>
<input id="recipientEmail" placeholder="kunde@email.de" />
</div>

<div class="formField">
<label for="recipientStreet">Straße</label>
<input id="recipientStreet" placeholder="Musterstraße 123" />
</div>

<div class="formField">
<label for="recipientCity">PLZ / Ort</label>
<input id="recipientCity" placeholder="12345 Berlin" />
</div>

<div class="formField">
<label for="dueDays">Fälligkeit</label>
<select id="dueDays">
<option value="7">7 Tage</option>
<option value="14" selected>14 Tage</option>
<option value="30">30 Tage</option>
</select>
</div>

<div class="formField">
<label for="serviceDate">Leistungsdatum</label>
<input id="serviceDate" type="date" />
</div>

<div class="formField full">
<label>Rechnungspositionen</label>

<div id="invoicePoints"></div>

<button type="button" class="btn btnSecondary addPointBtn" id="addInvoicePointBtn">
+ Position hinzufügen
</button>
</div>
</div>

<div class="buttonRow">
<a class="btn btnSecondary" href="/invoices" style="text-decoration:none;">Abbrechen</a>
<button type="submit" class="btn btnPrimary">Rechnung erstellen</button>
</div>
</form>
</section>
</main>
</div>

<script src="/js/app-layout.js"></script>
<script src="/js/invoice-create.js"></script>
</body>
</html>
