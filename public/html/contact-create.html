<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>WorkPilot – Kontakt erstellen</title>

<link rel="stylesheet" href="/css/app-layout.css" />
<link rel="stylesheet" href="/css/contact-create.css" />
</head>
<body>
<div class="appShell">
<aside class="sidebar">
<div>
<div class="logoWrap">
<div class="logoBox">WP</div>
<div class="logoText">WorkPilot</div>
</div>

<nav class="navGroup">
<a class="navLink" href="/">Dashboard</a>
<a class="navLink" href="/contacts">Kontakte</a>
<a class="navLink" href="/offers">Angebote</a>
<a class="navLink" href="/invoices">Rechnungen</a>
<a class="navLink" href="/emails">
E-Mails
<span id="emailCounter" class="navCounter" style="display:none;">0</span>
</a>
<a class="navLink" href="/settings">Profil</a>
</nav>
</div>

<div class="sidebarBottom">
<a class="navLink" href="/login">Anmelden</a>
</div>
</aside>

<main class="content">
<header class="pageHeader">
<div class="pageEyebrow">Kontakt</div>
<h1 class="pageTitle" id="pageTitle">Kontakt erstellen</h1>
<p class="pageSubtitle">
Lege einen neuen Kundenkontakt an oder bearbeite bestehende Kontaktdaten.
</p>
</header>

<section class="card contactCreateCard">
<form id="contactCreateForm" class="contactForm">
<div class="formGrid">
<div class="formField">
<label for="contactName">Name / Firma</label>
<input id="contactName" placeholder="Muster GmbH" required />
</div>

<div class="formField">
<label for="contactEmail">E-Mail</label>
<input id="contactEmail" placeholder="kunde@email.de" />
</div>

<div class="formField">
<label for="contactPhone">Telefon</label>
<input id="contactPhone" placeholder="+49 123 456789" />
</div>

<div class="formField">
<label for="contactStreet">Straße</label>
<input id="contactStreet" placeholder="Musterstraße 123" />
</div>

<div class="formField">
<label for="contactCity">PLZ / Ort</label>
<input id="contactCity" placeholder="12345 Berlin" />
</div>
</div>

<div class="buttonRow">
<a class="btn btnSecondary" href="/contacts">Abbrechen</a>

<button class="btn btnPrimary" type="submit" id="saveContactBtn">
Kontakt speichern
</button>
</div>
</form>
</section>
</main>
</div>

<script src="/js/app-layout.js"></script>
<script src="/js/contact-create.js"></script>
</body>
</html>
