<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>WorkPilot – Notiz erstellen</title>

<link rel="stylesheet" href="/css/app-layout.css" />
<link rel="stylesheet" href="/css/contact-create.css" />
</head>
<body>

<div class="appShell">

<aside class="sidebar">
<!-- gleiche Sidebar wie contact-create -->
</aside>

<main class="content">

<header class="pageHeader">
<div class="pageEyebrow">Notizen</div>

<h1 class="pageTitle" id="pageTitle">
Notiz erstellen
</h1>

<p class="pageSubtitle">
Speichere Informationen zu einem Kontakt.
</p>
</header>

<section class="card createCard">

<form id="noteCreateForm">

<div class="formField">
<label>Notiz</label>

<textarea
id="noteText"
rows="10"
placeholder="Notiz eingeben..."
required
></textarea>
</div>

<div class="buttonRow">
<button
type="submit"
class="btn btnPrimary"
id="saveNoteBtn"
>
Notiz speichern
</button>
</div>

</form>

</section>

</main>
</div>

<script src="/js/app-layout.js"></script>
<script src="/js/note-create.js"></script>

</body>
</html>
