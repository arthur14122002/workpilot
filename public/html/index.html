<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkPilot</title>

<link rel="stylesheet" href="/css/app-layout.css" />
<link rel="stylesheet" href="/css/index.css" />
</head>
<body>
<div class="appShell">
<aside class="sidebar">
<div>
<div class="logoWrap">
<div class="logoBox">WP</div>
<div class="logoText">WorkPilot</div>
</div>

<nav class="navGroup">
<a class="navLink" href="/">Dashboard</a>
<a class="navLink" href="/contacts">Kontakte</a>
<a class="navLink" href="/offers">Angebote</a>
<a class="navLink" href="/invoices">Rechnungen</a>
<a class="navLink" href="/emails">
E-Mails
<span id="emailCounter" class="navCounter" style="display:none;">0</span>
</a>
<a class="navLink" href="/settings">Profil</a>
</nav>
</div>

<div class="sidebarBottom">
<a class="navLink" href="/login">Anmelden</a>
</div>
</aside>

<main class="content">
<header class="pageHeader">
<div class="pageEyebrow">Übersicht</div>
<h1 class="pageTitle">Deine Kontakte</h1>
<p class="pageSubtitle">
Verwalte Kunden und ordne später Angebote, Rechnungen und Notizen zu.
</p>
</header>

<section class="card indexCard">
<div class="contactsHeader">
<div>
<h2>Kontaktübersicht</h2>
<p>Wähle einen Buchstaben oder lege einen neuen Kontakt an.</p>
</div>

<a class="btn btnPrimary" href="/contact-create">
+ Kontakt
</a>
</div>

<div id="letterNav" class="letterNav"></div>

<div id="contactsList" class="contactsList"></div>

<div id="emptyContacts" class="emptyState">
<p>Noch keine Kontakte vorhanden.</p>
</div>
</section>
</main>
</div>

<script src="/js/app-layout.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
